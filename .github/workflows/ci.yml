name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            ccache \
            libasio-dev \
            libomp-dev \
            libopenblas-dev \
            liblapack-dev \
            zlib1g-dev

      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: ccache-gcc-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            ccache-gcc-

      - name: Cache FetchContent sources
        uses: actions/cache@v4
        id: fc-cache
        with:
          path: |
            build/_deps/*-src
            build/_deps/*-subbuild
          key: fetchcontent-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            fetchcontent-

      - name: Configure
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            ${{ steps.fc-cache.outputs.cache-hit == 'true' && '-DFETCHCONTENT_FULLY_DISCONNECTED=ON' || '' }}

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test
        run: ctest --test-dir build --output-on-failure --timeout 300
