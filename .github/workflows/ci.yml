name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '.github/workflows/**'
      - 'grafana/**'
      - 'deploy/**'
      - 'clients/**'
      - 'ui/**'
      - '*.md'
      - '.release-please-manifest.json'
      - 'release-please-config.json'
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for C++ changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            cpp:
              - 'src/**'
              - 'include/**'
              - 'proto/**'
              - 'test/**'
              - 'CMakeLists.txt'
              - 'Makefile'

      - name: Install system dependencies
        if: steps.filter.outputs.cpp == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            ccache \
            libasio-dev \
            libomp-dev \
            libopenblas-dev \
            liblapack-dev \
            zlib1g-dev

      - name: Set up ccache
        if: steps.filter.outputs.cpp == 'true'
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: ccache-gcc-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            ccache-gcc-

      - name: Cache FetchContent sources
        if: steps.filter.outputs.cpp == 'true'
        uses: actions/cache@v4
        id: fc-cache
        with:
          path: |
            build/_deps/*-src
            build/_deps/*-subbuild
          key: fetchcontent-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            fetchcontent-

      - name: Build
        if: steps.filter.outputs.cpp == 'true'
        run: >
          make build
          BUILD_TYPE=Release
          CMAKE_EXTRA="-DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          ${{ steps.fc-cache.outputs.cache-hit == 'true' && '-DFETCHCONTENT_FULLY_DISCONNECTED=ON' || '' }}"

      - name: Test
        if: steps.filter.outputs.cpp == 'true'
        run: make test

      - name: Skip notice
        if: steps.filter.outputs.cpp == 'false'
        run: echo "No C++ changes detected — skipping build and test"
