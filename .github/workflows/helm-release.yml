name: Helm Release

on:
  push:
    branches: [main]
    paths:
      - 'deploy/helm/gvdb/**'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint chart
        run: helm lint deploy/helm/gvdb

      - name: Extract chart version
        id: chart
        run: |
          VERSION=$(grep '^version:' deploy/helm/gvdb/Chart.yaml | awk '{print $2}' | tr -d '"')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Package chart
        run: helm package deploy/helm/gvdb

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Push to OCI registry
        run: helm push gvdb-${{ steps.chart.outputs.version }}.tgz oci://ghcr.io/${{ steps.chart.outputs.owner }}/charts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: helm-v${{ steps.chart.outputs.version }}
          name: Helm Chart v${{ steps.chart.outputs.version }}
          body: |
            ## Install

            ```bash
            helm install gvdb oci://ghcr.io/${{ steps.chart.outputs.owner }}/charts/gvdb --version ${{ steps.chart.outputs.version }}
            ```

            ## Upgrade

            ```bash
            helm upgrade gvdb oci://ghcr.io/${{ steps.chart.outputs.owner }}/charts/gvdb --version ${{ steps.chart.outputs.version }}
            ```
          files: gvdb-${{ steps.chart.outputs.version }}.tgz
