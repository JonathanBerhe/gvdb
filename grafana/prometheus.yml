global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'gvdb'
    environment: 'development'

scrape_configs:
  - job_name: 'gvdb'
    static_configs:
      - targets: ['host.docker.internal:9090']
        labels:
          service: 'gvdb'
          instance: 'gvdb-node-1'
