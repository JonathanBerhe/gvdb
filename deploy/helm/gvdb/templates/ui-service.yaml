{{- if .Values.ui.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "gvdb.fullname" . }}-ui
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gvdb.labels" . | nindent 4 }}
    app: {{ include "gvdb.fullname" . }}-ui
spec:
  type: {{ .Values.ui.service.type }}
  selector:
    app: {{ include "gvdb.fullname" . }}-ui
  ports:
    - name: http
      port: {{ .Values.ui.service.port }}
      targetPort: {{ .Values.ui.port }}
{{- end }}
