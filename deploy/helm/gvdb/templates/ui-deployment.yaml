{{- if .Values.ui.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gvdb.fullname" . }}-ui
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gvdb.labels" . | nindent 4 }}
    app: {{ include "gvdb.fullname" . }}-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "gvdb.fullname" . }}-ui
  template:
    metadata:
      labels:
        app: {{ include "gvdb.fullname" . }}-ui
    spec:
      containers:
        - name: ui
          image: "{{ .Values.ui.image.repository }}:{{ .Values.ui.image.tag }}"
          imagePullPolicy: {{ .Values.ui.image.pullPolicy }}
          args:
            - "--gvdb-addr"
            - "{{ include "gvdb.fullname" . }}-proxy:{{ .Values.proxy.service.port }}"
            - "--port"
            - "{{ .Values.ui.port }}"
          ports:
            - containerPort: {{ .Values.ui.port }}
              name: http
          readinessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.ui.port }}
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.ui.port }}
            initialDelaySeconds: 5
            periodSeconds: 20
          resources:
            {{- toYaml .Values.ui.resources | nindent 12 }}
{{- end }}
