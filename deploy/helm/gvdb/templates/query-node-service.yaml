apiVersion: v1
kind: Service
metadata:
  name: {{ include "gvdb.queryNode.serviceName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gvdb.queryNode.labels" . | nindent 4 }}
spec:
  clusterIP: None
  selector:
    {{- include "gvdb.queryNode.selectorLabels" . | nindent 4 }}
  ports:
    - name: grpc
      port: 50070
      targetPort: 50070
