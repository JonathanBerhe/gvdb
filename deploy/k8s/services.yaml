apiVersion: v1
kind: Service
metadata:
  name: coordinator
  namespace: gvdb
  labels:
    app: gvdb-coordinator
spec:
  clusterIP: None
  selector:
    app: gvdb-coordinator
  ports:
    - name: grpc
      port: 50051
      targetPort: 50051
    - name: raft
      port: 8300
      targetPort: 8300
    - name: metrics
      port: 9091
      targetPort: 9091
---
apiVersion: v1
kind: Service
metadata:
  name: data-node
  namespace: gvdb
  labels:
    app: gvdb-data-node
spec:
  clusterIP: None
  selector:
    app: gvdb-data-node
  ports:
    - name: grpc
      port: 50060
      targetPort: 50060
---
apiVersion: v1
kind: Service
metadata:
  name: query-node
  namespace: gvdb
  labels:
    app: gvdb-query-node
spec:
  clusterIP: None
  selector:
    app: gvdb-query-node
  ports:
    - name: grpc
      port: 50070
      targetPort: 50070
---
apiVersion: v1
kind: Service
metadata:
  name: proxy
  namespace: gvdb
  labels:
    app: gvdb-proxy
spec:
  type: NodePort
  selector:
    app: gvdb-proxy
  ports:
    - name: grpc
      port: 50050
      targetPort: 50050
      nodePort: 30050
    - name: metrics
      port: 9050
      targetPort: 9050
