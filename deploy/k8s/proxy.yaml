apiVersion: apps/v1
kind: Deployment
metadata:
  name: gvdb-proxy
  namespace: gvdb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gvdb-proxy
  template:
    metadata:
      labels:
        app: gvdb-proxy
    spec:
      initContainers:
        - name: wait-for-coordinator
          image: gvdb:latest
          imagePullPolicy: Never
          command: ["sh", "-c"]
          args:
            - |
              echo "Waiting for coordinator..."
              until nc -z gvdb-coordinator-0.coordinator.gvdb.svc.cluster.local 50051; do
                sleep 2
              done
              echo "Coordinator is ready"
        - name: wait-for-data-node
          image: gvdb:latest
          imagePullPolicy: Never
          command: ["sh", "-c"]
          args:
            - |
              echo "Waiting for data node..."
              until nc -z gvdb-data-node-0.data-node.gvdb.svc.cluster.local 50060; do
                sleep 2
              done
              echo "Data node is ready"
      containers:
        - name: proxy
          image: gvdb:latest
          imagePullPolicy: Never
          command:
            - /usr/local/bin/gvdb-proxy
          args:
            - "--node-id"
            - "1"
            - "--bind-address"
            - "0.0.0.0:50050"
            - "--data-dir"
            - "/tmp/gvdb/proxy"
            - "--coordinators"
            - "gvdb-coordinator-0.coordinator.gvdb.svc.cluster.local:50051"
            - "--data-nodes"
            - "gvdb-data-node-0.data-node.gvdb.svc.cluster.local:50060,gvdb-data-node-1.data-node.gvdb.svc.cluster.local:50060"
            - "--query-nodes"
            - "gvdb-query-node-0.query-node.gvdb.svc.cluster.local:50070"
          ports:
            - containerPort: 50050
              name: grpc
            - containerPort: 9050
              name: metrics
          readinessProbe:
            tcpSocket:
              port: 50050
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 50050
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              memory: "128Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
