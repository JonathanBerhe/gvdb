syntax = "proto3";

package gvdb.proto;

option go_package = "gvdb/integration-tests/pb";

// ============================================================================
// Core Data Types
// ============================================================================

message Vector {
  repeated float values = 1;
  uint32 dimension = 2;
}

// Metadata value (supports multiple types)
message MetadataValue {
  oneof value {
    int64 int_value = 1;
    double double_value = 2;
    string string_value = 3;
    bool bool_value = 4;
  }
}

// Metadata (key-value pairs)
message Metadata {
  map<string, MetadataValue> fields = 1;
}

message VectorWithId {
  uint64 id = 1;
  Vector vector = 2;
  Metadata metadata = 3;  // Optional metadata
}

message SearchResultEntry {
  uint64 id = 1;
  float distance = 2;
  Metadata metadata = 3;  // Optional: return metadata with results
}

// ============================================================================
// Collection Management
// ============================================================================

message CreateCollectionRequest {
  string collection_name = 1;
  uint32 dimension = 2;

  enum MetricType {
    L2 = 0;
    INNER_PRODUCT = 1;
    COSINE = 2;
  }
  MetricType metric = 3;

  enum IndexType {
    FLAT = 0;
    HNSW = 1;
    IVF_FLAT = 2;
    IVF_PQ = 3;    // Inverted File with Product Quantization
    IVF_SQ = 4;    // Inverted File with Scalar Quantization
  }
  IndexType index_type = 4;

  uint32 num_shards = 5;  // Number of shards (0 = default 1)
}

message CreateCollectionResponse {
  uint32 collection_id = 1;
  string message = 2;
}

message DropCollectionRequest {
  string collection_name = 1;
}

message DropCollectionResponse {
  string message = 1;
}

message ListCollectionsRequest {}

message CollectionInfo {
  uint32 collection_id = 1;
  string collection_name = 2;
  uint32 dimension = 3;
  string metric_type = 4;
  uint64 vector_count = 5;
}

message ListCollectionsResponse {
  repeated CollectionInfo collections = 1;
}

// ============================================================================
// Vector Operations
// ============================================================================

message InsertRequest {
  string collection_name = 1;
  repeated VectorWithId vectors = 2;
}

message InsertResponse {
  uint64 inserted_count = 1;
  string message = 2;
}

message SearchRequest {
  string collection_name = 1;
  Vector query_vector = 2;
  uint32 top_k = 3;
  string filter = 4;  // Optional: SQL-like filter expression (e.g., "price < 100 AND brand = 'Nike'")
  bool return_metadata = 5;  // Optional: whether to return metadata in results
}

message SearchResponse {
  repeated SearchResultEntry results = 1;
  float query_time_ms = 2;
}

message GetRequest {
  string collection_name = 1;
  repeated uint64 ids = 2;  // Vector IDs to retrieve
  bool return_metadata = 3;  // Optional: whether to return metadata
}

message GetResponse {
  repeated VectorWithId vectors = 1;  // Retrieved vectors (may be fewer than requested if some IDs not found)
  repeated uint64 not_found_ids = 2;  // IDs that were not found
}

message DeleteRequest {
  string collection_name = 1;
  repeated uint64 ids = 2;  // Vector IDs to delete
}

message DeleteResponse {
  uint64 deleted_count = 1;  // Number of vectors actually deleted
  repeated uint64 not_found_ids = 2;  // IDs that were not found
  string message = 3;
}

message UpdateMetadataRequest {
  string collection_name = 1;
  uint64 id = 2;  // Vector ID to update
  Metadata metadata = 3;  // New metadata (replaces existing)
  bool merge = 4;  // If true, merge with existing metadata. If false, replace completely.
}

message UpdateMetadataResponse {
  bool updated = 1;  // Whether the update succeeded
  string message = 2;
}

// ============================================================================
// Vector Browsing (for Web UI)
// ============================================================================

message ListVectorsRequest {
  string collection_name = 1;
  uint32 limit = 2;           // Page size (default 20)
  uint64 offset = 3;          // Offset for pagination
  bool include_metadata = 4;
}

message ListVectorsResponse {
  repeated VectorWithId vectors = 1;
  uint64 total_count = 2;
  bool has_more = 3;
}

// ============================================================================
// Health and Status
// ============================================================================

message HealthCheckRequest {}

message HealthCheckResponse {
  enum Status {
    UNKNOWN = 0;
    SERVING = 1;
    NOT_SERVING = 2;
  }
  Status status = 1;
  string message = 2;
}

message GetStatsRequest {}

message GetStatsResponse {
  uint64 total_vectors = 1;
  uint64 total_collections = 2;
  uint64 total_queries = 3;
  float avg_query_time_ms = 4;
}

// ============================================================================
// Hybrid Search (BM25 + Vector)
// ============================================================================

message HybridSearchRequest {
  string collection_name = 1;
  Vector query_vector = 2;     // Dense vector query
  string text_query = 3;       // Text query for BM25
  uint32 top_k = 4;
  string filter = 5;           // Optional metadata filter
  bool return_metadata = 6;
  float vector_weight = 7;     // 0.0-1.0 (default: 0.5 if both set)
  float text_weight = 8;       // 0.0-1.0 (default: 0.5 if both set)
  string text_field = 9;       // Metadata field for BM25 (default: "text")
}

message HybridSearchResponse {
  repeated SearchResultEntry results = 1;
  float query_time_ms = 2;
}

// ============================================================================
// VectorDB Service
// ============================================================================

service VectorDBService {
  // Collection management
  rpc CreateCollection(CreateCollectionRequest) returns (CreateCollectionResponse);
  rpc DropCollection(DropCollectionRequest) returns (DropCollectionResponse);
  rpc ListCollections(ListCollectionsRequest) returns (ListCollectionsResponse);

  // Vector operations
  rpc Insert(InsertRequest) returns (InsertResponse);
  rpc StreamInsert(stream InsertRequest) returns (InsertResponse);
  rpc Search(SearchRequest) returns (SearchResponse);
  rpc Get(GetRequest) returns (GetResponse);
  rpc Delete(DeleteRequest) returns (DeleteResponse);
  rpc UpdateMetadata(UpdateMetadataRequest) returns (UpdateMetadataResponse);
  rpc ListVectors(ListVectorsRequest) returns (ListVectorsResponse);

  // Hybrid search (BM25 + vector)
  rpc HybridSearch(HybridSearchRequest) returns (HybridSearchResponse);

  // Health and stats
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);
  rpc GetStats(GetStatsRequest) returns (GetStatsResponse);
}